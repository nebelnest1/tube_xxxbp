      mainExit: "main_exit",

      const pad = (n, size = 2) => String(n).padStart(size, "0");
      return `${d.getUTCFullYear()}-${pad(d.getUTCMonth() + 1)}-${pad(d.getUTCDate())} ${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())}.${pad(d.getUTCMilliseconds() * 1000, 6)} +00:00`;
    };

   const getLang = () => {
  let v = (new URLSearchParams(window.location.search).get("lang") || "en")
    .slice(0, 2)
    .toLowerCase();
  if (v === "fil") v = "tl";
  return v || "en";
};

    const getHistory = () => {
      try {
        const raw = sessionStorage.getItem(EVENTS_STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    };

    const saveHistory = (items) => {
      try {
        sessionStorage.setItem(EVENTS_STORAGE_KEY, JSON.stringify(items));
      } catch {}
    };

    const getTemplateHashes = () => {
      try {
        return window.templateHashes ? JSON.parse(JSON.stringify(window.templateHashes)) : {};
      } catch {
        return {};
      }
    };

    window.syncMetric = ({
      event,
      exitZoneId,
      errorMessage = "",
      errorSubType,
      errorType,
      skipHistory = false,
      skipContext = false

      const html = document.documentElement;

      const eventName = eventMap[event] || event || "unknown";

      if (!skipHistory) {
        history.push({ currentTs: nowTs, eventName, delta });
        if (history.length > MAX_EVENTS) history.shift();

        error_sub_type: errorSubType,
        error_type: errorType,
        env: ds.env || "",
        js_version: html.getAttribute("js-version") || ""
      }];

      return {
        eventData: payload,
        isAnalyticEnabled: APP_CONFIG.isAnalyticEnabled ?? true
